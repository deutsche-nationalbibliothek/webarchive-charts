---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dags-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: file-copy-pod
  labels:
    name: file-copy-pod
spec:
  containers:
  - name: file-copy-container
    image: busybox
    command:
      - "sh"
      - "-c"
      - "sleep 3000" # Keep pod running until file operation completes
    volumeMounts:
      - name: local-storage
        mountPath: /data
  volumes:
    - name: local-storage
      persistentVolumeClaim:
        claimName: dags-pvc
  restartPolicy: Never